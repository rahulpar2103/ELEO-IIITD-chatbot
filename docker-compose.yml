services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  chatbot:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

  celery-worker:
    build: .
    command: celery -A worker.celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

  celery-beat:
    build: .
    command: celery -A worker.celery_app beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped
